name: "EVCC Token Renewal"
version: "1.0.2"
slug: evcc_token_renewal
description: "Automatically renews EVCC trial sponsor tokens before they expire"
url: "https://github.com/cschnaible-1899/evcc-token-renewal"
arch:
  - aarch64
  - amd64
init: false
hassio_api: true
hassio_role: manager
map:
  - type: homeassistant_config
    read_only: false
options:
  evcc_yaml_path: "/homeassistant/evcc.yaml"
  evcc_addon_slug: "49686a9f_evcc"
  renewal_threshold_days: 2
  check_time: "02:15"
schema:
  evcc_yaml_path: str
  evcc_addon_slug: str
  renewal_threshold_days: int
  check_time: str
